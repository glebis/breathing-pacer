<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-6 Breathing Pacer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@800&family=Geist+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', 'Courier New', monospace;
    cursor: none;
    user-select: none;
  }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#vizCanvas {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    z-index: 2;
    transition: height var(--duration) cubic-bezier(0.35, 0, 0.25, 1);
    will-change: height;
  }

  .fill-line {
    position: absolute;
    top: -2px;
    left: 0;
    width: 100%;
    height: 4px;
    z-index: 3;
  }

  .label {
    position: absolute;
    right: 3rem;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255, 214, 10, 0.15);
    font-family: 'Geist', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    z-index: 10;
    transition: opacity 0.8s ease;
  }

  .counter {
    position: absolute;
    bottom: 2.5rem;
    right: 3rem;
    color: rgba(232, 93, 4, 0.3);
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    z-index: 10;
  }

  .beat-num {
    position: absolute;
    bottom: 2.5rem;
    left: 3rem;
    color: rgba(255, 214, 10, 0.25);
    font-size: 1rem;
    font-weight: 500;
    z-index: 10;
    transition: color 0.15s ease;
  }

  .beat-num.flash { color: rgba(255, 214, 10, 0.6); }

  .mode-indicator {
    position: absolute;
    top: 2.5rem;
    left: 3rem;
    color: rgba(255, 255, 255, 0.15);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    z-index: 10;
  }

  .pulse-dot {
    position: absolute;
    top: 2.5rem;
    right: 3rem;
    width: 10px;
    height: 10px;
    background: rgba(232, 93, 4, 0.5);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.1s ease;
    box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.3);
  }

  .pulse-dot.on { opacity: 1; }

  .start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: #1a0a00;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  .start-screen h1 {
    color: #e85d04;
    font-family: 'Geist', Arial, sans-serif;
    font-size: 4rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    margin-bottom: 0.5rem;
    text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
  }

  .start-screen p {
    color: rgba(255, 214, 10, 0.5);
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
  }

  .start-screen .sub {
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: rgba(232, 93, 4, 0.3);
    letter-spacing: 0.15em;
  }

  .start-screen .info {
    margin-top: 0.8rem;
    font-size: 0.7rem;
    color: rgba(255, 255, 255, 0.12);
    letter-spacing: 0.1em;
  }

  .hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div class="container">
  <div class="start-screen" id="startScreen">
    <h1>5 — 6</h1>
    <p>inhale 5 · exhale 6</p>
    <p class="sub">tap to begin</p>
    <p class="info">← → arrows to change visual mode</p>
  </div>

  <canvas id="vizCanvas"></canvas>
  <div class="fill" id="fill"><div class="fill-line" id="fillLine"></div></div>
  <div class="label" id="label"></div>
  <div class="counter" id="counter"></div>
  <div class="beat-num" id="beatNum"></div>
  <div class="mode-indicator" id="modeIndicator"></div>
  <div class="pulse-dot" id="pulseDot"></div>
</div>

<script type="module" src="src/main.js"></script>

</body>
</html>
